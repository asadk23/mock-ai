name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push (simple)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/asadk23/mock-ai:${{ steps.version.outputs.version }}
            ghcr.io/asadk23/mock-ai:latest

      - name: Build and push (non-root)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.nonroot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/asadk23/mock-ai:${{ steps.version.outputs.version }}-nonroot
            ghcr.io/asadk23/mock-ai:latest-nonroot
